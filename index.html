<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ea002a">
<title>SP Reconciler — SPM APA</title>
<style>
  :root {
    --spm-red:    #ea002a;
    --spm-blue:   #0031a1;
    --text:       #111827;
    --text-dim:   #6b7280;
    --border:     #e5e7eb;
    --bg:         #f9fafb;
    --bg-card:    #ffffff;
    --ok:         #16a34a;
    --warn:       #ca8a04;
    --bad:        #dc2626;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    color: var(--text);
    background: var(--bg);
    line-height: 1.5;
    min-height: 100vh;
  }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px;
    background: linear-gradient(90deg, var(--spm-red) 0%, var(--spm-blue) 100%);
    color: #fff;
  }
  .header h1 {
    font-size: 1.15rem; font-weight: 800; margin: 0;
    letter-spacing: 0.2px;
  }
  .header .ver { font-size: 0.78rem; opacity: 0.85; }
  main { max-width: 1100px; margin: 0 auto; padding: 18px; }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .card h2 {
    margin: 0 0 12px; font-size: 1.05rem; font-weight: 800;
    color: var(--text);
  }
  .empty {
    text-align: center; padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty-title { font-size: 1.1rem; font-weight: 800; color: var(--text); margin-bottom: 6px; }
  .empty-msg { font-size: 0.92rem; line-height: 1.5; max-width: 420px; margin: 0 auto; }
  .empty code {
    background: #f3f4f6; padding: 2px 6px; border-radius: 4px;
    font-family: ui-monospace, monospace; font-size: 0.85em;
  }

  /* ─── Upload zone ─────────────────────────────────────────────────*/
  .upload-zone {
    display: flex; flex-direction: column; align-items: center;
    gap: 8px; padding: 36px 22px; text-align: center;
    border: 2px dashed var(--border); border-radius: 14px;
    background: #fafbfc; cursor: pointer;
    transition: border-color 120ms, background-color 120ms, transform 120ms;
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--spm-blue); background: #eff6ff;
  }
  .upload-zone.dragover { transform: scale(1.01); }
  .upload-zone .uz-icon {
    width: 52px; height: 52px; color: var(--spm-blue); opacity: 0.7;
  }
  .upload-zone .uz-title { font-weight: 800; font-size: 1.05rem; color: var(--text); }
  .upload-zone .uz-sub { color: var(--text-dim); font-size: 0.9rem; max-width: 360px; line-height: 1.4; }
  .upload-zone input[type=file] { display: none; }

  /* ─── Slot indicators (file status) ────────────────────────────────*/
  .slot-row {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    margin-top: 14px;
  }
  @media (max-width: 800px) {
    .slot-row { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 480px) {
    .slot-row { grid-template-columns: 1fr; }
  }
  .slot {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px;
    border: 1px solid var(--border); border-radius: 10px;
    background: #fafbfc;
    transition: border-color 120ms, background-color 120ms;
    /* Grid items default to min-content; explicitly allow shrinking so the
       ellipsis on .slot-sub actually kicks in instead of the slot widening. */
    min-width: 0; overflow: hidden;
  }
  .slot.filled { background: #f0fdf4; border-color: var(--ok); }
  .slot-icon {
    width: 32px; height: 32px; flex: 0 0 auto;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: #e5e7eb; color: #9ca3af;
  }
  .slot.filled .slot-icon { background: var(--ok); color: #fff; }
  .slot-icon svg { width: 18px; height: 18px; }
  .slot-text { flex: 1; min-width: 0; }
  .slot-label { font-weight: 800; font-size: 0.95rem; color: var(--text); }
  .slot-sub {
    font-size: 0.82rem; color: var(--text-dim); margin-top: 2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ─── Action bar ───────────────────────────────────────────────────*/
  .action-bar {
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    margin-top: 16px; padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  .action-bar .grow { flex: 1; }

  /* ─── Session-mismatch banner ─────────────────────────────────────*/
  .banner {
    margin-top: 14px; padding: 12px 14px;
    border-radius: 10px; font-size: 0.9rem;
    display: flex; align-items: flex-start; gap: 10px; line-height: 1.45;
  }
  .banner.err {
    background: #fef2f2; color: #7f1d1d; border: 1px solid #fecaca;
  }
  .banner-icon { flex: 0 0 auto; width: 20px; height: 20px; }
  .banner strong { color: #991b1b; }

  /* ─── Buttons ──────────────────────────────────────────────────────*/
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    font: inherit; font-weight: 800; font-size: 0.95rem;
    padding: 10px 18px; border-radius: 9px;
    background: var(--spm-blue); color: #fff;
    border: 1px solid var(--spm-blue);
    cursor: pointer; transition: filter 120ms, opacity 120ms;
  }
  .btn:hover:not(:disabled) { filter: brightness(0.92); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn.secondary { background: #fff; color: var(--spm-blue); }
  .btn.danger    { background: #fff; color: var(--bad); border-color: var(--bad); }
  .btn.large     { padding: 11px 22px; font-size: 1rem; }

  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  th, td {
    border-bottom: 1px solid var(--border);
    padding: 6px 8px;
    text-align: left;
    vertical-align: top;
  }
  th { background: #f3f4f6; font-weight: 800; font-size: 0.84rem; }
  td.n, th.n { text-align: right; font-variant-numeric: tabular-nums; }
  tr.ok td { background: #fff; }
  tr.bad td { background: #fef2f2; }
  tr.warn td { background: #fef3c7; }
  .tag {
    display: inline-block; padding: 1px 8px; border-radius: 10px;
    font-size: 0.74rem; font-weight: 800; letter-spacing: 0.3px;
  }
  .tag.ok   { background: #dcfce7; color: #14532d; }
  .tag.bad  { background: #fee2e2; color: #7f1d1d; }
  .tag.warn { background: #fef3c7; color: #713f12; }
  .tag.info { background: #dbeafe; color: #1e3a8a; }

  .summary-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    margin-bottom: 12px;
  }
  @media (max-width: 600px) {
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
  }
  .sgcell {
    background: #f9fafb; border: 1px solid var(--border);
    border-radius: 8px; padding: 10px;
  }
  .sgcell .lbl { font-size: 0.76rem; color: var(--text-dim); }
  .sgcell .val { font-size: 1.4rem; font-weight: 800; }
  .sgcell .val.bad  { color: var(--bad); }
  .sgcell .val.ok   { color: var(--ok); }

  details { margin-top: 6px; }
  details > summary {
    cursor: pointer; font-size: 0.85rem; color: var(--spm-blue);
    user-select: none;
  }
  .by-div-list { margin-top: 4px; padding-left: 14px; font-size: 0.85rem; color: var(--text-dim); }
  .by-div-list li { margin: 2px 0; }

  /* Auto-update — matches BreakOut/OurRack canonical pattern. */
  .update-overlay {
    position: fixed; inset: 0; background: rgba(10,20,40,0.72);
    z-index: 9999; display: none; align-items: center; justify-content: center;
    padding: 24px;
  }
  .update-overlay.shown { display: flex; }
  .update-box {
    background: #fff; border-radius: 14px; padding: 32px;
    max-width: 380px; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .update-spinner {
    width: 48px; height: 48px; margin: 0 auto 16px; border-radius: 50%;
    border: 5px solid rgba(0,49,161,0.15);
    border-top-color: var(--spm-blue);
    animation: spin 0.85s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .update-title { font-size: 1.1rem; font-weight: 800; color: var(--spm-blue); margin-bottom: 6px; }

  .toast {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: #fff; padding: 10px 18px;
    border-radius: 8px; font-size: 0.92rem; font-weight: 600;
    box-shadow: 0 6px 24px rgba(0,0,0,0.25);
    z-index: 1000; opacity: 0; transition: opacity 200ms;
  }
  .toast.shown { opacity: 1; }
  .toast.err { background: var(--bad); }
  .toast.ok  { background: var(--ok); }
</style>
</head>
<body>

<div class="header">
  <h1>SP Reconciler</h1>
  <div class="ver" id="versionLabel"></div>
</div>

<main id="main"></main>

<div class="update-overlay" id="updateOverlay">
  <div class="update-box">
    <div class="update-spinner"></div>
    <div class="update-title">Updating SP Reconciler</div>
    <div>A new version is being deployed&hellip;</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="version.js?_=__TS__"></script>
<script>
/* version.js cache-buster (server-side template would replace __TS__; for
   GitHub Pages we just inline below). */
(function(){
  const s = document.currentScript.previousElementSibling;
  if (s && s.src.indexOf('__TS__') !== -1) {
    s.src = s.src.replace('__TS__', Date.now());
  }
})();
</script>

<script>
/* ════════════════════════════════════════════════════════════════════════
   SPReconciler — ingest two APA End-Of-Session SP reports and reconcile
   them. Source of truth: the all-league report. The by-division report
   has additional team-of-record info per award but is sometimes wrong.

   Internal-only admin tool — gated behind ?key=<service_role>.
   ════════════════════════════════════════════════════════════════════════ */
const APP_NAME = 'SPReconciler';
const SB_URL   = 'https://dqzbekoaysgaiqljueac.supabase.co';
const SB_ANON  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxemJla29heXNnYWlxbGp1ZWFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNzA5NzgsImV4cCI6MjA5MDc0Njk3OH0.cCdGxZ4zEFzU_r6lWSDeoNWG67Q4MSYCAtpds035dfU';
const SCHEMA   = 'sprecon';

const URL_PARAMS = new URLSearchParams(location.search);
const SB_KEY     = URL_PARAMS.get('key') || '';
const HAS_KEY    = !!SB_KEY;

const HEADERS_READ  = { apikey: SB_ANON, Authorization: 'Bearer ' + SB_ANON, 'Accept-Profile': SCHEMA };
const HEADERS_WRITE = HAS_KEY
  ? { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json',
      'Accept-Profile': SCHEMA, 'Content-Profile': SCHEMA,
      Prefer: 'return=representation' }
  : null;
const HEADERS_APA   = { apikey: SB_ANON, Authorization: 'Bearer ' + SB_ANON, 'Accept-Profile': 'apa_core' };

/* ─── State ─────────────────────────────────────────────────────────────*/
let _ll = null;       // parsed all-league
let _bd = null;       // parsed by-division
let _8skunk = null;   // 8-ball skunk events: { session_label, printed_at, events: [...] }
let _recon = null;    // reconciliation result

/* ─── PDF.js (lazy) ─────────────────────────────────────────────────────*/
let _pdfjs = null;
async function loadPdfjs() {
  if (_pdfjs) return _pdfjs;
  _pdfjs = await import('https://cdn.jsdelivr.net/npm/pdfjs-dist@4.7.76/build/pdf.min.mjs');
  _pdfjs.GlobalWorkerOptions.workerSrc =
    'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.7.76/build/pdf.worker.min.mjs';
  return _pdfjs;
}

/* Extract text from PDF, returning array of page-line arrays. */
async function pdfPageLines(file) {
  const pdfjs = await loadPdfjs();
  const buf = await file.arrayBuffer();
  const doc = await pdfjs.getDocument({ data: new Uint8Array(buf) }).promise;
  const pages = [];
  for (let p = 1; p <= doc.numPages; p++) {
    const page = await doc.getPage(p);
    const tc = await page.getTextContent();
    // Bucket text items by Y coordinate (transform[5]) — items with the
    // same Y belong to the same visual line.
    const lines = new Map();
    for (const it of tc.items) {
      const y = Math.round(it.transform[5] * 10) / 10;
      const x = it.transform[4];
      if (!lines.has(y)) lines.set(y, []);
      lines.get(y).push({ x, str: it.str });
    }
    // Sort each line left-to-right, then collapse to string.
    const sorted = [...lines.entries()]
      .sort((a, b) => b[0] - a[0])  // PDF y origin = bottom-left, so descending y = top-to-bottom
      .map(([_, items]) => items.sort((a, b) => a.x - b.x).map(i => i.str).join(' ').replace(/\s+/g, ' ').trim())
      .filter(line => line.length > 0);
    pages.push(sorted);
  }
  return pages;
}

/* ─── Shared line helpers ────────────────────────────────────────────────
   PDF.js groups text into runs by Y-coordinate. The all-league and by-
   division reports both put the member# + name (and team# for by-div) on
   one line, and the 6 count integers on the NEXT line. So we pair line
   i (the "header" line) with the first subsequent line that's all-ints. */
const INT_ROW_RE = /^\d+(?:\s+\d+){5}$/;   // exactly 6 integers, space-separated

/* Detect the PDF type from its content (not its filename — users have
   files like "spring_all_xdiv.pdf" that are actually all-league). Returns
   'll', 'bd', '8skunk', '9skunk', or 'unknown'. Strategy: title text wins,
   with section-pattern fallbacks. */
function detectKind(pages) {
  const lines = pages.flat();
  // Title-based detection (most reliable). Check most-specific first.
  for (const ln of lines.slice(0, 20)) {
    if (/8-Ball.*Skunk.*Report/i.test(ln)) return '8skunk';
    if (/9-Ball.*Skunk.*Report/i.test(ln)) return '9skunk';
    if (/End Of Session Award Summary By Division/i.test(ln)) return 'bd';
  }
  for (const ln of lines.slice(0, 20)) {
    if (/End Of Session Award Summary/i.test(ln)) return 'll';
  }
  // Fallback: division-section header pattern (e.g. "005 - No-Po").
  for (const ln of lines) {
    if (/^\d{1,3}\s*-\s*\S/.test(ln) && !/^\d{5}\b/.test(ln)) return 'bd';
  }
  return 'unknown';
}

function findIntsAfter(lines, i) {
  // Look ahead a few lines for the int row associated with the header at i.
  // Skip blank lines and page-footer noise. Don't skip past another header.
  for (let j = i + 1; j < Math.min(i + 4, lines.length); j++) {
    const ln = lines[j];
    if (!ln) continue;
    if (INT_ROW_RE.test(ln)) {
      return { ints: ln.trim().split(/\s+/).map(s => parseInt(s, 10)), at: j };
    }
    // If we hit another member#-line or a division header before finding
    // the ints, bail — the row is malformed or the int line was lost.
    if (/^\d{5}\b/.test(ln)) return null;
    if (/^\d{1,3}\s*-\s*\S/.test(ln)) return null;
  }
  return null;
}

function extractMeta(lines) {
  let session_label = null, printed_at = null;
  for (const ln of lines) {
    if (!session_label) {
      const m = ln.match(/^(Summer|Spring|Fall|Winter)\s+\d{4}$/i);
      if (m) session_label = ln;
    }
    if (!printed_at) {
      const m = ln.match(/Printed\s+(\d+\/\d+\/\d+)\s*\/\s*(\d+:\d+:\d+\s*[AP]M)/i);
      if (m) printed_at = m[1] + ' ' + m[2];
    }
    if (session_label && printed_at) break;
  }
  return { session_label, printed_at };
}

/* ─── Parser: All-league ───────────────────────────────────────────────
   Line A: "<5-digit member#> <member name (with spaces)>"
   Line B: "<6 ints>"   columns: Rackless, 8 OB, 8 B&R, 9 OS, 9 B&R, Skunk
   The "Grand Slam" column header appears in the PDF but is empty for the
   entire session in the data we've seen — so grand_slam is always 0 in
   this parser. */
function parseAllLeague(pages) {
  const lines = pages.flat();
  const { session_label, printed_at } = extractMeta(lines);
  const rows = [];
  for (let i = 0; i < lines.length; i++) {
    const ln = lines[i];
    // Member-header line: starts with 5-digit number.
    const m = ln.match(/^(\d{5})\s+(.+?)\s*$/);
    if (!m) continue;
    const member_number = m[1];
    const member_name = m[2].trim();
    // Skip false positives: header-text or division names. A real data
    // header is followed within a few lines by an INT_ROW.
    const found = findIntsAfter(lines, i);
    if (!found) continue;
    const [rackless, eight_ob, eight_br, nine_os, nine_br, skunk] = found.ints;
    rows.push({ member_number, member_name,
                rackless, eight_ob, eight_br, nine_os, nine_br, skunk,
                grand_slam: 0 });
    i = found.at;  // advance past the int line so it isn't re-matched
  }
  // Dedup by member_number (multi-page repeats — unlikely but defensive).
  const byMem = new Map();
  for (const r of rows) {
    if (!byMem.has(r.member_number)) byMem.set(r.member_number, r);
  }
  return { session_label, printed_at, rows: [...byMem.values()] };
}

/* ─── Parser: By-division ──────────────────────────────────────────────
   Three line kinds:
   - Division header:  "005 - No-Po"  (1-3 digit number, dash, name)
   - Member-header:    "<5-digit member#> <name> <5-digit team#>"
   - Ints:             "<6 ints>"   columns: RN, 8OB, 8B&R, 9OS, 9B&R, Skunk
*/
function parseByDivision(pages) {
  const lines = pages.flat();
  const { session_label, printed_at } = extractMeta(lines);
  const rows = [];
  let cur_div_num = null, cur_div_name = null;
  for (let i = 0; i < lines.length; i++) {
    const ln = lines[i];
    // Division header (e.g. "005 - No-Po") — must NOT also be a member# line.
    const dh = ln.match(/^(\d{1,3})\s*-\s*(.+?)\s*$/);
    if (dh && !/^\d{5}\b/.test(ln)) {
      cur_div_num = dh[1].padStart(3, '0');
      cur_div_name = dh[2].trim();
      continue;
    }
    if (!cur_div_num) continue;
    // Member-header line: "<member#> <name> <team#>" — team# is the
    // trailing 5-digit number; everything between is the name.
    const m = ln.match(/^(\d{5})\s+(.+?)\s+(\d{5})\s*$/);
    if (!m) continue;
    const member_number = m[1];
    const member_name = m[2].trim();
    const team_number = m[3];
    const found = findIntsAfter(lines, i);
    if (!found) continue;
    const [rackless, eight_ob, eight_br, nine_os, nine_br, skunk] = found.ints;
    rows.push({
      division_number: cur_div_num,
      division_name: cur_div_name,
      team_number,
      member_number, member_name,
      rackless, eight_ob, eight_br, nine_os, nine_br, skunk
    });
    i = found.at;
  }
  return { session_label, printed_at, rows };
}

/* ─── Parser: 8-Ball Skunk Report ──────────────────────────────────────
   Per-event log (one row per skunk). PDF.js groups by Y so each event is
   TWO consecutive lines:
     A: "<5-digit member#>"
     B: "<name> On Team <5-digit team#> - <team name>"
   Sectioned by "Night of Play: MM/DD/YYYY" headers. The header line has
   "Play Dates From X To Y" we use as the synthetic session_label. */
const SKUNK_TEAM_LINE_RE = /^(.+?)\s+On Team\s+(\d{5})\s+-\s+(.+)$/i;

function parseSkunks(pages, ballType) {
  const lines = pages.flat();
  let session_label = null, printed_at = null, curNight = null;
  const events = [];
  for (const ln of lines.slice(0, 20)) {
    const m = ln.match(/Play Dates From\s+(\d+\/\d+\/\d{4})\s+To\s+(\d+\/\d+\/\d{4})/i);
    if (m) { session_label = m[1] + ' – ' + m[2]; break; }
  }
  for (const ln of lines) {
    if (printed_at) break;
    const m = ln.match(/Printed\s+(\d+\/\d+\/\d+)\s*\/?\s*(\d+:\d+:\d+\s*[AP]M)?/i);
    if (m) printed_at = (m[1] || '') + (m[2] ? ' ' + m[2] : '');
  }
  for (let i = 0; i < lines.length; i++) {
    const ln = lines[i];
    const nm = ln.match(/^Night of Play:\s+(\d+\/\d+\/\d{4})/i);
    if (nm) { curNight = nm[1]; continue; }
    if (!/^\d{5}$/.test(ln)) continue;
    const member_number = ln;
    const next = lines[i + 1];
    if (!next) continue;
    const tm = next.match(SKUNK_TEAM_LINE_RE);
    if (!tm) continue;
    events.push({
      member_number,
      member_name: tm[1].trim(),
      team_number: tm[2],
      team_name: tm[3].trim(),
      night: curNight,
      ball_type: ballType   // '8' or '9'
    });
    i++; // consume the team line
  }
  return { session_label, printed_at, events };
}

/* ─── Reconciliation ───────────────────────────────────────────────────*/
const CATS = ['rackless','eight_ob','eight_br','nine_os','nine_br','skunk'];
const CAT_LABELS = { rackless:'Rackless', eight_ob:'8 OB', eight_br:'8 B&R',
                     nine_os:'9 OS', nine_br:'9 B&R', skunk:'Skunk', grand_slam:'Grand Slam' };

function reconcile(ll, bd) {
  // Index by member.
  const llByMem = new Map(ll.rows.map(r => [r.member_number, r]));
  const bdByMem = new Map();
  for (const r of bd.rows) {
    if (!bdByMem.has(r.member_number)) bdByMem.set(r.member_number, []);
    bdByMem.get(r.member_number).push(r);
  }
  const members = new Set([...llByMem.keys(), ...bdByMem.keys()]);
  const results = [];
  for (const m of members) {
    const ll_row = llByMem.get(m);
    const bd_rows = bdByMem.get(m) || [];
    const bd_sum = {};
    for (const c of CATS) bd_sum[c] = bd_rows.reduce((s, r) => s + (r[c]||0), 0);
    if (!ll_row) {
      results.push({ kind: 'BD_ONLY', member_number: m,
                     member_name: bd_rows[0].member_name,
                     ll: null, bd_sum, bd_rows });
      continue;
    }
    if (bd_rows.length === 0) {
      // Member in all-league but not by-division. Only meaningful if they
      // have any non-grand-slam counts, since by-division can't represent GS.
      const ll_non_gs = CATS.reduce((s,c) => s + (ll_row[c]||0), 0);
      if (ll_non_gs > 0) {
        results.push({ kind: 'LL_ONLY', member_number: m,
                       member_name: ll_row.member_name,
                       ll: ll_row, bd_sum: null, bd_rows: [] });
      } else if ((ll_row.grand_slam||0) > 0) {
        // Has only Grand Slam — by-division can't represent it. Not a true discrepancy.
        results.push({ kind: 'GS_ONLY', member_number: m,
                       member_name: ll_row.member_name,
                       ll: ll_row, bd_sum: null, bd_rows: [] });
      }
      continue;
    }
    // Both present — compare per-category.
    let cat_diffs = [];
    for (const c of CATS) {
      const a = ll_row[c]||0, b = bd_sum[c]||0;
      if (a !== b) cat_diffs.push({ cat: c, ll: a, bd: b });
    }
    if (cat_diffs.length === 0) {
      results.push({ kind: 'MATCH', member_number: m,
                     member_name: ll_row.member_name,
                     ll: ll_row, bd_sum, bd_rows });
    } else {
      // Bucket the kind: missing, extra, or category-mismatch.
      const ll_total = cat_diffs.reduce((s,d) => s + d.ll, 0);
      const bd_total = cat_diffs.reduce((s,d) => s + d.bd, 0);
      let kind = 'CATEGORY_MISMATCH';
      if (ll_total > bd_total) kind = 'MISSING_IN_BD';
      else if (bd_total > ll_total) kind = 'EXTRA_IN_BD';
      results.push({ kind, member_number: m,
                     member_name: ll_row.member_name,
                     ll: ll_row, bd_sum, bd_rows, cat_diffs });
    }
  }
  // Sort: discrepancies first, then matches.
  const ord = { BD_ONLY:0, LL_ONLY:1, MISSING_IN_BD:2, EXTRA_IN_BD:3, CATEGORY_MISMATCH:4, GS_ONLY:5, MATCH:6 };
  results.sort((a,b) => (ord[a.kind] - ord[b.kind]) || a.member_number.localeCompare(b.member_number));
  return results;
}

/* ─── By-person-by-team aggregation ───────────────────────────────────
   Merges by-division rows (which already give us per-team counts for
   Rackless, 8 OB, 8 B&R, 9 OS, 9 B&R, 9-Skunk) with 8-ball skunk events
   (counted per player+team). Grand Slam is not in the by-division
   report; the all-league report has it but doesn't attribute to a team,
   so it's left out of this v0.1 view. */
function buildByPersonTeam() {
  const map = new Map();
  const k = (m, t) => m + '|' + t;
  const blank = () => ({
    rackless: 0, eight_ob: 0, eight_br: 0,
    nine_os: 0, nine_br: 0, nine_skunk: 0, eight_skunk: 0
  });
  if (_bd && _bd.rows) {
    for (const r of _bd.rows) {
      const key = k(r.member_number, r.team_number);
      if (!map.has(key)) map.set(key, {
        member_number: r.member_number,
        member_name:   r.member_name,
        team_number:   r.team_number,
        team_name:     '',
        division_number: r.division_number,
        division_name:   r.division_name,
        counts: blank()
      });
      const e = map.get(key);
      e.counts.rackless   += r.rackless   || 0;
      e.counts.eight_ob   += r.eight_ob   || 0;
      e.counts.eight_br   += r.eight_br   || 0;
      e.counts.nine_os    += r.nine_os    || 0;
      e.counts.nine_br    += r.nine_br    || 0;
      e.counts.nine_skunk += r.skunk      || 0;   // by-division "Skunk" = 9-ball
    }
  }
  if (_8skunk && _8skunk.events) {
    for (const ev of _8skunk.events) {
      const key = k(ev.member_number, ev.team_number);
      if (!map.has(key)) map.set(key, {
        member_number: ev.member_number,
        member_name:   ev.member_name,
        team_number:   ev.team_number,
        team_name:     ev.team_name,
        division_number: null,
        division_name:   null,
        counts: blank()
      });
      const e = map.get(key);
      if (!e.team_name && ev.team_name) e.team_name = ev.team_name;
      if (!e.member_name && ev.member_name) e.member_name = ev.member_name;
      e.counts.eight_skunk += 1;
    }
  }
  const rows = [...map.values()];
  rows.sort((a, b) =>
    a.member_number.localeCompare(b.member_number) ||
    a.team_number.localeCompare(b.team_number));
  return rows;
}

function renderByPersonTeam(rows) {
  if (rows.length === 0) {
    return '<div class="empty">No data yet.</div>';
  }
  const head =
    '<thead><tr>'
    + '<th>Member</th><th>Team</th>'
    + '<th class="n">Rack</th>'
    + '<th class="n">8 OB</th><th class="n">8 B&R</th>'
    + '<th class="n">9 OS</th><th class="n">9 B&R</th>'
    + '<th class="n">9 Sk</th><th class="n">8 Sk</th>'
    + '<th class="n">Σ</th>'
    + '</tr></thead>';
  const body = rows.map(r => {
    const c = r.counts;
    const total = c.rackless + c.eight_ob + c.eight_br + c.nine_os + c.nine_br + c.nine_skunk + c.eight_skunk;
    const cell = v => '<td class="n">' + (v || '<span style="color:var(--text-dim)">·</span>') + '</td>';
    const teamCell = '<strong>' + esc(r.team_number) + '</strong>'
                   + (r.team_name ? '<br><span style="color:var(--text-dim);font-size:0.82rem;">' + esc(r.team_name) + '</span>' : '')
                   + (r.division_number ? '<br><span style="color:var(--text-dim);font-size:0.78rem;">div ' + esc(r.division_number) + '</span>' : '');
    return '<tr>'
      + '<td><strong>' + esc(r.member_number) + '</strong><br>' + esc(r.member_name) + '</td>'
      + '<td>' + teamCell + '</td>'
      + cell(c.rackless) + cell(c.eight_ob) + cell(c.eight_br)
      + cell(c.nine_os) + cell(c.nine_br)
      + cell(c.nine_skunk) + cell(c.eight_skunk)
      + '<td class="n"><strong>' + total + '</strong></td>'
      + '</tr>';
  }).join('');
  return '<div style="overflow-x:auto"><table>' + head + '<tbody>' + body + '</tbody></table></div>';
}

/* ─── Render ───────────────────────────────────────────────────────────*/
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function render() {
  const main = document.getElementById('main');
  if (!HAS_KEY) {
    main.innerHTML =
      '<div class="card empty">'
      + '<div class="empty-title">Access required</div>'
      + '<div class="empty-msg">Append <code>?key=&lt;service_role&gt;</code> to the URL to enter.</div>'
      + '</div>';
    return;
  }

  let html = '';

  // Session-mismatch banner (if both loaded but sessions differ).
  const sessionMismatch = (_ll && _bd && _ll.session_label && _bd.session_label
                           && _ll.session_label !== _bd.session_label);

  // Upload card — single drop zone, auto-detect type, two slot indicators.
  html += '<div class="card">'
    + '<h2>Upload session reports</h2>'
    + '<label class="upload-zone" id="dropZone">'
    +   '<svg class="uz-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">'
    +     '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>'
    +     '<polyline points="17 8 12 3 7 8"/>'
    +     '<line x1="12" y1="3" x2="12" y2="15"/>'
    +   '</svg>'
    +   '<div class="uz-title">Drop PDFs here</div>'
    +   '<div class="uz-sub">or tap to choose. Upload one or both at once — type is auto-detected from the report title.</div>'
    +   '<input type="file" accept="application/pdf" multiple>'
    + '</label>'
    + '<div class="slot-row">'
    +   slotIndicator('All-league',  _ll)
    +   slotIndicator('By-division', _bd)
    +   slotIndicator('8-Ball Skunks', _8skunk)
    + '</div>'
    + (sessionMismatch
        ? '<div class="banner err">'
          + '<svg class="banner-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'
          +   '<path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>'
          +   '<line x1="12" y1="9" x2="12" y2="13"/>'
          +   '<line x1="12" y1="17" x2="12.01" y2="17"/>'
          + '</svg>'
          + '<div><strong>Session mismatch</strong> — the two uploads are from different sessions: '
          + '<strong>' + esc(_ll.session_label) + '</strong> (all-league) vs '
          + '<strong>' + esc(_bd.session_label) + '</strong> (by-division). Reconcile is disabled.</div>'
          + '</div>'
        : '')
    + '<div class="action-bar">'
    +   '<button class="btn large" id="reconBtn"' + (_ll && _bd && !sessionMismatch ? '' : ' disabled') + '>Reconcile</button>'
    +   '<button class="btn secondary" id="saveBtn"' + (_recon ? '' : ' disabled') + '>Save to Supabase</button>'
    +   '<span class="grow"></span>'
    +   '<button class="btn danger" id="clearBtn"' + (_ll || _bd ? '' : ' disabled') + '>Clear</button>'
    + '</div>'
    + '</div>';

  // Reconciliation result.
  if (_recon) {
    const counts = countByKind(_recon);
    html += '<div class="card">'
      + '<h2>Reconciliation</h2>'
      + '<div class="summary-grid">'
      + sgcell('Matched', counts.MATCH || 0, 'ok')
      + sgcell('Discrepancies', (_recon.length - (counts.MATCH || 0) - (counts.GS_ONLY || 0)), 'bad')
      + sgcell('Grand-slam only', counts.GS_ONLY || 0, '')
      + sgcell('Total members', _recon.length, '')
      + '</div>'
      + renderTable(_recon)
      + '</div>';
  }

  // By-person-by-team view (shown when by-division is loaded — adds 8-ball
  // skunk counts when that report is also loaded).
  if (_bd) {
    const ppt = buildByPersonTeam();
    html += '<div class="card">'
      + '<h2>All SPs by person by team'
      +   (_8skunk
            ? ' <span class="tag info" style="font-size:0.66rem;vertical-align:middle;">incl. 8-ball skunks</span>'
            : ' <span class="tag warn" style="font-size:0.66rem;vertical-align:middle;">no 8-ball skunks loaded</span>')
      + '</h2>'
      + '<div style="font-size:0.85rem; color:var(--text-dim); margin-bottom:8px;">'
      +   ppt.length + ' (player, team) rows. "9 Sk" comes from the by-division Skunk column. '
      +   (_8skunk ? '"8 Sk" comes from the 8-Ball Skunk Report (counted per player+team).'
                   : 'Load the 8-Ball Skunk Report to populate the "8 Sk" column.')
      + '</div>'
      + renderByPersonTeam(ppt)
      + '</div>';
  }

  main.innerHTML = html;
  wireUploadZones();
  document.getElementById('reconBtn').addEventListener('click', doReconcile);
  document.getElementById('saveBtn').addEventListener('click', doSave);
  document.getElementById('clearBtn').addEventListener('click', doClear);
}

function slotIndicator(label, state) {
  const filled = !!state;
  const icon = filled
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>';
  let sub;
  if (filled) {
    // Different report shapes have different payload arrays.
    const payload = state.rows || state.events || [];
    const noun = state.events ? 'events' : 'rows';
    sub = esc((state.session_label || 'unknown session') + ' · ' + payload.length + ' ' + noun
            + (state.filename ? ' · ' + state.filename : ''));
  } else {
    sub = 'Not loaded yet';
  }
  return '<div class="slot' + (filled ? ' filled' : '') + '">'
    + '<div class="slot-icon">' + icon + '</div>'
    + '<div class="slot-text">'
    +   '<div class="slot-label">' + esc(label) + '</div>'
    +   '<div class="slot-sub">' + sub + '</div>'
    + '</div></div>';
}

function wireUploadZones() {
  const zone = document.getElementById('dropZone');
  if (!zone) return;
  const input = zone.querySelector('input[type=file]');
  async function consumeFiles(files) {
    // Process sequentially so toasts/state updates land in order.
    for (const f of files) {
      // eslint-disable-next-line no-await-in-loop
      await handleFile('auto', f);
    }
  }
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('dragover');
    if (e.dataTransfer.files.length) consumeFiles([...e.dataTransfer.files]);
  });
  input.addEventListener('change', e => {
    if (e.target.files.length) consumeFiles([...e.target.files]);
    // Reset the input so the same file can be re-picked if needed.
    e.target.value = '';
  });
}

const SLOT_LABEL = { ll: 'All-league', bd: 'By-division', '8skunk': '8-Ball Skunks', '9skunk': '9-Ball Skunks' };

async function handleFile(_droppedKind, file) {
  if (!file || file.type !== 'application/pdf') {
    toast('Only PDF files are accepted', true);
    return;
  }
  try {
    toast('Parsing ' + file.name + '…');
    const pages = await pdfPageLines(file);
    // Auto-detect from PDF content. Filenames lie — route by content only.
    const detected = detectKind(pages);
    if (detected === 'unknown') {
      throw new Error('Could not identify report type — title text didn’t match any known format');
    }
    let parsed, payloadCount;
    if (detected === 'll') {
      parsed = parseAllLeague(pages);
      payloadCount = parsed.rows.length;
    } else if (detected === 'bd') {
      parsed = parseByDivision(pages);
      payloadCount = parsed.rows.length;
    } else if (detected === '8skunk') {
      parsed = parseSkunks(pages, '8');
      payloadCount = parsed.events.length;
    } else if (detected === '9skunk') {
      throw new Error('9-Ball Skunk report support is not implemented yet (v0.2)');
    }
    parsed.filename = file.name;
    if (payloadCount === 0) {
      throw new Error('Identified as ' + SLOT_LABEL[detected] + ' but no rows extracted');
    }
    if (detected === 'll')      _ll = parsed;
    else if (detected === 'bd') _bd = parsed;
    else if (detected === '8skunk') _8skunk = parsed;
    _recon = null;  // any new upload invalidates reconciliation
    render();
    toast(SLOT_LABEL[detected] + ' loaded: ' + payloadCount + ' rows · ' + (parsed.session_label || 'unknown session'), 'ok');
    if (_ll && _bd && _ll.session_label && _bd.session_label && _ll.session_label !== _bd.session_label) {
      toast('⚠ Session mismatch: "' + _ll.session_label + '" vs "' + _bd.session_label + '"', true);
    }
  } catch (e) {
    toast('Parse failed: ' + e.message, true);
  }
}

function doReconcile() {
  if (!_ll || !_bd) return;
  _recon = reconcile(_ll, _bd);
  render();
}

function doClear() {
  if (!confirm('Clear all loaded data?')) return;
  _ll = _bd = _8skunk = _recon = null;
  render();
}

async function doSave() {
  if (!_recon) return;
  toast('Save to Supabase — not implemented yet (v0.2)');
  // TODO v0.2: POST to sprecon.reports, then bulk insert all_league_rows + by_division_rows.
}

function countByKind(recon) {
  const c = {};
  for (const r of recon) c[r.kind] = (c[r.kind] || 0) + 1;
  return c;
}

function sgcell(label, val, cls) {
  return `<div class="sgcell"><div class="lbl">${esc(label)}</div><div class="val ${esc(cls)}">${esc(val)}</div></div>`;
}

function renderTable(recon) {
  if (recon.length === 0) return '<div class="empty">Nothing to show.</div>';
  let html = '<div style="overflow-x:auto"><table>'
    + '<thead><tr><th>Member</th><th>Status</th><th class="n">Rack.</th><th class="n">8OB</th><th class="n">8B&R</th><th class="n">9OS</th><th class="n">9B&R</th><th class="n">Skunk</th><th class="n">GS</th><th>Where earned (by-div)</th></tr></thead><tbody>';
  for (const r of recon) {
    const tag = tagFor(r.kind);
    const rowCls = r.kind === 'MATCH' || r.kind === 'GS_ONLY' ? 'ok' : 'bad';
    html += '<tr class="' + rowCls + '">';
    html += '<td><strong>' + esc(r.member_number) + '</strong><br>' + esc(r.member_name) + '</td>';
    html += '<td>' + tag + '</td>';
    for (const c of CATS) {
      const ll = r.ll ? (r.ll[c]||0) : null;
      const bd = r.bd_sum ? (r.bd_sum[c]||0) : null;
      html += '<td class="n">' + cellCounts(ll, bd) + '</td>';
    }
    // Grand slam — by-division has no column for it, so just show LL.
    const gs = r.ll ? (r.ll.grand_slam||0) : 0;
    html += '<td class="n">' + (gs > 0 ? '<strong>'+gs+'</strong>' : gs) + '</td>';
    // Where earned (by-division row list).
    html += '<td>' + (r.bd_rows && r.bd_rows.length
      ? '<details><summary>' + r.bd_rows.length + ' entr' + (r.bd_rows.length === 1 ? 'y' : 'ies') + '</summary>'
        + '<ul class="by-div-list">'
        + r.bd_rows.map(b => '<li>' + esc(b.division_number + ' ' + b.division_name + ' · team ' + b.team_number)
            + ' — ' + summarizeCounts(b) + '</li>').join('')
        + '</ul></details>'
      : '<span style="color:var(--text-dim);font-size:0.85rem;">—</span>') + '</td>';
    html += '</tr>';
  }
  html += '</tbody></table></div>';
  return html;
}

function cellCounts(ll, bd) {
  if (ll == null && bd == null) return '<span style="color:var(--text-dim)">—</span>';
  if (ll === bd) return ll;
  return '<span style="color:var(--bad)"><strong>' + (ll == null ? '—' : ll) + '</strong> / ' + (bd == null ? '—' : bd) + '</span>';
}

function summarizeCounts(row) {
  const parts = [];
  for (const c of CATS) {
    if ((row[c]||0) > 0) parts.push(CAT_LABELS[c] + '×' + row[c]);
  }
  return parts.length ? parts.join(', ') : '0';
}

function tagFor(kind) {
  const map = {
    MATCH:           ['ok',   'MATCH'],
    GS_ONLY:         ['info', 'GS ONLY'],
    BD_ONLY:         ['bad',  'BD ONLY'],
    LL_ONLY:         ['bad',  'LL ONLY'],
    MISSING_IN_BD:   ['bad',  'MISSING IN BD'],
    EXTRA_IN_BD:     ['warn', 'EXTRA IN BD'],
    CATEGORY_MISMATCH: ['warn', 'CAT MISMATCH']
  };
  const [cls, label] = map[kind] || ['', kind];
  return '<span class="tag ' + cls + '">' + esc(label) + '</span>';
}

/* ─── Toast ────────────────────────────────────────────────────────────*/
let _toastTimer = null;
function toast(msg, kind) {
  // Backward compat: old call sites pass `true` for error. Treat `true`
  // as 'err', falsy as default, and 'ok'/'err'/etc. as a CSS class.
  const t = document.getElementById('toast');
  t.textContent = msg;
  const cls = kind === true ? 'err' : (typeof kind === 'string' ? kind : '');
  t.className = 'toast shown' + (cls ? ' ' + cls : '');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('shown'), 3500);
}

/* ─── Version auto-update ──────────────────────────────────────────────
   Canonical SPM pattern (matches BreakOut / OurRack):
     1. Poll apa_core.apps every 30s for the registered version.
     2. On mismatch: show blocking overlay (so user doesn't keep working
        on stale code) AND start polling THIS app's version.js until the
        deployed copy reports the new version.
     3. Only then reload — guarantees the reload returns the new HTML
        instead of strand-looping on cached old HTML.
   Per MEMORY: "On mismatch: blocking overlay + poll the deployed HTML
   for the new APP_VERSION string before reloading." */
let _versionMismatch = false;
async function checkVersion() {
  if (_versionMismatch) return;
  try {
    const r = await fetch(SB_URL + '/rest/v1/apps?app_name=eq.' + APP_NAME + '&select=version',
                          { headers: HEADERS_APA });
    if (!r.ok) return;
    const d = await r.json();
    if (d && d[0] && d[0].version && d[0].version !== window.APP_VERSION) {
      _versionMismatch = true;
      document.getElementById('updateOverlay').classList.add('shown');
      pollForDeploy(d[0].version);
    }
  } catch (_) {}
}
function pollForDeploy(target) {
  setTimeout(async () => {
    try {
      const r = await fetch('version.js?_=' + Date.now());
      if (r.ok && (await r.text()).indexOf("APP_VERSION = '" + target + "'") !== -1) {
        const u = new URL(location.href);
        u.searchParams.set('_', String(Date.now()));
        location.replace(u.toString());
        return;
      }
    } catch (_) {}
    pollForDeploy(target);
  }, 3000);
}

/* ─── Init ─────────────────────────────────────────────────────────────*/
async function init() {
  document.title = APP_NAME;
  document.getElementById('versionLabel').textContent = 'v' + (window.APP_VERSION || '?');
  checkVersion();
  setInterval(checkVersion, 30000);
  render();
}
document.addEventListener('DOMContentLoaded', init);
</script>
